<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Spring Bootの基礎を学ぼう</title>
	<style>
		body {font-family: sans-serif; margin: 40px;}
		table { border-collapse: collapse;}
		td { padding: 8px 12px;}
	</style>
</head>

<body>
	<h2>お問い合わせフォーム</h2>
	<form th:action="@{/form}" method="post" th:object="${contactForm}">
		<table>
			
			<tr>
				<td><label for="name">お名前</label></td>
				<td>
					<input type="text" th:field="*{name}"><br>
					<span th:if="*{#fields.hasErrors('name')}" th:errors="*{name}" style="color: red;"></span>
				</td>
			</tr>
			<tr>
				<td><label for="email">メールアドレス</label></td>
				<td>
					<input type="text" th:field="*{email}"><br>
					<span th:if="*{#fields.hasErrors('email')}" th:errors="*{email}" style="color: red;"></span>
				</td>
			</tr>
			<tr>
				<td><label for="message">お問い合わせ内容</label></td>
				<td>
					<textarea cols="30" rows="10" th:field="*{message}"></textarea><br>
					<span th:if="*{#fields.hasErrors('message')}" th:errors="*{message}" style="color: red;"></span>
				</td>
			</tr>
			
		</table>
		
		<button type="submit">送信</button>
				
	</form>

</body>
</html>
